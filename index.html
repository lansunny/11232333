<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPNet 中文学术汇报</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="deck-shell">
    <aside class="navigator" aria-label="页面导航">
      <div class="logo-mark">IP</div>
      <div class="deck-name">
        <strong>IPNet</strong>
        <span>Temporal Link Prediction</span>
      </div>
      <nav id="thumbs" class="thumbs" aria-label="幻灯片列表"></nav>
    </aside>

    <section class="stage" aria-live="polite">
      <div class="topbar">
        <span id="sectionLabel">论文汇报</span>
        <div class="progress"><span id="progress"></span></div>
        <span id="counter">01 / 14</span>
      </div>
      <div id="slides" class="slides"></div>
      <footer class="controls">
        <button id="prev" type="button" aria-label="上一页">‹</button>
        <span>← / → 或空格翻页</span>
        <button id="next" type="button" aria-label="下一页">›</button>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
